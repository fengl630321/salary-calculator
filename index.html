<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加班費計算器</title>
<style>
    body {
        font-family: "Microsoft JhengHei", sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 20px;
        background-color: #f5f5f5;
    }

    .container {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        color: #333;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #0078d7;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #005fa3;
    }

    .result {
        margin-top: 20px;
        padding: 15px;
        background: #eef7ff;
        border-radius: 5px;
    }

    .result p {
        margin: 8px 0;
        font-size: 18px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>加班費計算器</h2>

    <div class="form-group">
        <label for="salary">月薪</label>
        <input type="number" id="salary" placeholder="請輸入月薪">
    </div>

    <div class="form-group">
        <label for="ot12">前2小時加班時數</label>
        <input type="number" id="ot12" placeholder="請輸入時數" step="0.5">
    </div>

    <div class="form-group">
        <label for="ot3">第3小時加班時數</label>
        <input type="number" id="ot3" placeholder="請輸入時數" step="0.5">
    </div>

    <button onclick="calculate()">計算</button>

    <div class="result" id="result" style="display:none;">
        <p>平均時薪：<span id="hourlyWage"></span> 元</p>
        <p>總計加班費：<span id="overtimePay"></span> 元</p>
        <p>當月薪資合計：<span id="totalSalary"></span> 元</p>
    </div>
</div>

<script>
function calculate() {
    const salary = parseFloat(document.getElementById("salary").value) || 0;
    const ot12 = parseFloat(document.getElementById("ot12").value) || 0;
    const ot3 = parseFloat(document.getElementById("ot3").value) || 0;

    // 平均時薪
    const hourlyWage = salary / 240;

    // 總計加班費
    const overtimePay =
        (hourlyWage * ot12 * 1.34) +
        (hourlyWage * ot3 * 1.67);

    // 當月薪資合計
    const totalSalary = salary + overtimePay;

    document.getElementById("hourlyWage").textContent =
        hourlyWage.toFixed(2);

    document.getElementById("overtimePay").textContent =
        overtimePay.toFixed(2);

    document.getElementById("totalSalary").textContent =
        totalSalary.toFixed(2);

    document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
